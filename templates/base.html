<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Maheshkumar{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --text-primary: #e5e5e5;
            --text-secondary: #a3a3a3;
            --text-muted: #525252;
            --accent: #10b981;
            --accent-hover: #34d399;
            --accent-glow: rgba(16, 185, 129, 0.15);
            --accent-tool: #06b6d4;
            --border: #262626;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --max-width: 900px;
            --border-radius: 8px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-family);
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--bg-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }

        .site-nav {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            max-width: var(--max-width);
            margin: 0 auto;
            flex-wrap: wrap;
        }

        .site-nav .nav-brand {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1.125rem;
        }

        .site-nav a {
            font-size: 0.875rem;
            color: var(--text-secondary);
            transition: color 150ms ease;
        }

        .site-nav a:hover, .site-nav a.active {
            color: var(--accent);
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        .page-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        .build-info {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-align: center;
            padding: 2rem 0 1rem;
            border-top: 1px solid var(--border);
            margin-top: 3rem;
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <nav class="site-nav">
        <a href="/" class="nav-brand">Maheshkumar</a>
        <a href="/feed" {% if active == 'feed' %}class="active"{% endif %}>Feed</a>
        <a href="/football" {% if active == 'football' %}class="active"{% endif %}>Football</a>
        <a href="/f1" {% if active == 'f1' %}class="active"{% endif %}>F1</a>
        <a href="/1d" {% if active == '1d' %}class="active"{% endif %}>1D</a>
        <a href="/st" {% if active == 'st' %}class="active"{% endif %}>ST</a>
        <a href="/birthdays" {% if active == 'birthdays' %}class="active"{% endif %}>Birthdays</a>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <div class="build-info">
        Built on {{ build_time }}
    </div>
</body>
</html>
